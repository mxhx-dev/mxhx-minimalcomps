name: Haxelib

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/upload-artifact@v7
        with:
          name: mxhx-minimalcomps-haxelib
          path: |
            src/
            haxelib.json
            include.xml
            mxhx-manifest.xml
            README.md
            LICENSE
            NOTICE
            CHANGELOG.md
          if-no-files-found: error
